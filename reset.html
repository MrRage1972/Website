<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Reset Password · MySecretary</title>
  <style>
    :root {
      --bg:#0A0A0A; --surface:#111111; --surface-raised:#1A1A1A; --separator:#2A2A2A;
      --gold:#D4920A; --gold-bright:#FFB820; --gold-dark:#7A4500;
      --text:#FFFFFF; --text-2:#A0A0A0; --text-3:#555555; --danger:#FF4444;
    }
    * { box-sizing:border-box; }
    body {
      margin:0; min-height:100vh; background:var(--bg); color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      display:flex; align-items:flex-start; justify-content:center; padding:32px 20px;
    }
    .card {
      width:100%; max-width:400px; background:var(--surface); border:1px solid var(--separator);
      border-radius:18px; padding:28px 24px; margin-top:6vh;
    }
    .brand { text-align:center; margin-bottom:20px; }
    .brand .mark {
      width:56px; height:56px; border-radius:50%; margin:0 auto 12px;
      background:linear-gradient(135deg,var(--gold-bright),var(--gold),var(--gold-dark));
      display:flex; align-items:center; justify-content:center; font-size:26px;
      box-shadow:0 0 18px rgba(212,146,10,.35);
    }
    h1 { font-size:20px; margin:0 0 4px; text-align:center; }
    .sub { color:var(--text-2); font-size:14px; text-align:center; margin:0 0 22px; }
    label { display:block; font-size:13px; color:var(--text-2); margin:14px 0 6px; }
    input[type=password] {
      width:100%; padding:13px 14px; background:var(--surface-raised); color:var(--text);
      border:1px solid var(--gold-dark); border-radius:12px; font-size:16px; outline:none;
    }
    input:focus { border-color:var(--gold); }
    button {
      width:100%; margin-top:20px; padding:15px; border:0; border-radius:14px; cursor:pointer;
      font-size:16px; font-weight:600; color:var(--bg);
      background:linear-gradient(135deg,var(--gold-bright),var(--gold),var(--gold-dark));
    }
    button:disabled { opacity:.5; cursor:default; }
    .msg { margin-top:14px; font-size:14px; text-align:center; min-height:18px; }
    .msg.err { color:var(--danger); }
    .msg.ok { color:var(--gold); }
    .hidden { display:none; }
    .done { text-align:center; }
    .done .big { font-size:40px; margin-bottom:8px; }
    .hint { color:var(--text-3); font-size:12px; text-align:center; margin-top:18px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="mark">✦</div>
      <h1>Reset your password</h1>
      <p class="sub">Choose a new password for your MySecretary account.</p>
    </div>

    <!-- Loading / invalid state -->
    <div id="status" class="msg">Checking your reset link…</div>

    <!-- Reset form (hidden until a valid recovery session is detected) -->
    <form id="form" class="hidden" onsubmit="submitNewPassword(event)">
      <label for="pw">New password</label>
      <input id="pw" type="password" autocomplete="new-password" placeholder="At least 6 characters" />
      <label for="pw2">Confirm new password</label>
      <input id="pw2" type="password" autocomplete="new-password" placeholder="Re-enter password" />
      <button id="submit" type="submit">Update Password</button>
      <div id="formMsg" class="msg"></div>
    </form>

    <!-- Success state -->
    <div id="done" class="done hidden">
      <div class="big">✅</div>
      <h1>Password updated</h1>
      <p class="sub">You can now return to the MySecretary app and sign in with your new password.</p>
    </div>

    <p class="hint">RNV-TECH LLC · MySecretary</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ── CONFIG ───────────────────────────────────────────────────────────────
    // SUPABASE_URL is this project. ANON KEY is the PUBLIC "anon/publishable"
    // key (safe to embed in a web page) — copy it from Supabase → Project
    // Settings → API → "anon public". Replace the placeholder below.
    const SUPABASE_URL      = "https://fefmkvhpetlzcxgddqgh.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_C7wBiZlIooUYkY1Qz2OTRg_UIXL-DdQERE";
    // ─────────────────────────────────────────────────────────────────────────

    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const $ = (id) => document.getElementById(id);
    let ready = false;

    function showForm() {
      if (ready) return;
      ready = true;
      $("status").classList.add("hidden");
      $("form").classList.remove("hidden");
    }
    function showInvalid(text) {
      if (ready) return;
      $("status").className = "msg err";
      $("status").textContent = text;
    }
    function formMsg(text, isErr) {
      $("formMsg").className = "msg " + (isErr ? "err" : "ok");
      $("formMsg").textContent = text;
    }

    // The Supabase client auto-parses the recovery token from the URL hash and
    // emits PASSWORD_RECOVERY. We also poll getSession() as a fallback.
    sb.auth.onAuthStateChange((event, session) => {
      if (event === "PASSWORD_RECOVERY" || session) showForm();
    });

    window.addEventListener("load", async () => {
      const { data } = await sb.auth.getSession();
      if (data.session) { showForm(); return; }
      setTimeout(async () => {
        const { data } = await sb.auth.getSession();
        if (data.session) showForm();
        else showInvalid("This reset link is invalid or has expired. Please request a new link from the app.");
      }, 1200);
    });

    async function submitNewPassword(e) {
      e.preventDefault();
      const pw = $("pw").value, pw2 = $("pw2").value;
      if (pw.length < 6) { formMsg("Password must be at least 6 characters.", true); return; }
      if (pw !== pw2)    { formMsg("Passwords don't match.", true); return; }
      $("submit").disabled = true;
      formMsg("Updating…", false);
      const { error } = await sb.auth.updateUser({ password: pw });
      if (error) { formMsg(error.message, true); $("submit").disabled = false; return; }
      $("form").classList.add("hidden");
      $("done").classList.remove("hidden");
    }
  </script>
</body>
</html>
